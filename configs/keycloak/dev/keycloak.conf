db=postgres
http-enabled=true
http-port=8080
health-enabled=true
metrics-enabled=true
hostname=localhost
hostname-strict=false
proxy-headers=xforwarded
cache=local

# Supported local cache tuning for development.
# Adjust these first when you want to experiment with cache sizing locally.
cache-embedded-realms-max-count=10000
cache-embedded-users-max-count=10000
cache-embedded-authorization-max-count=10000
cache-embedded-keys-max-count=1000

log-level=INFO
