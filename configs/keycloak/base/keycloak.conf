db=postgres
http-enabled=true
http-port=8080
health-enabled=true
metrics-enabled=true
hostname-strict=false
proxy-headers=xforwarded
cache=local

# Supported Keycloak cache tuning belongs here.
# For local development, keep cache=local and tune embedded caches via
# cache-embedded-*-max-count options before touching cache-ispn.xml.
cache-embedded-realms-max-count=10000
cache-embedded-users-max-count=10000
cache-embedded-authorization-max-count=10000
cache-embedded-keys-max-count=1000

log=console
