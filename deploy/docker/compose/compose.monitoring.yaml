services:
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:latest}
    env_file:
      - ../env/prometheus.env
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ../../../configs/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped

  loki:
    image: ${LOKI_IMAGE:-grafana/loki:3.1.1}
    env_file:
      - ../env/loki.env
    command:
      - -config.file=/etc/loki/loki-config.yml
    volumes:
      - ../../../configs/monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    restart: unless-stopped

  promtail:
    image: ${PROMTAIL_IMAGE:-grafana/promtail:3.1.1}
    env_file:
      - ../env/promtail.env
    command:
      - -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    volumes:
      - ../../../configs/monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${PROMTAIL_PORT:-9080}:9080"
    restart: unless-stopped

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana-oss:latest}
    depends_on:
      - prometheus
      - loki
    env_file:
      - ../env/grafana.env
    secrets:
      - source: grafana_admin_password
        target: grafana_admin_password
    volumes:
      - ../../../configs/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ../../../configs/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../../../observability/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  loki_data:
