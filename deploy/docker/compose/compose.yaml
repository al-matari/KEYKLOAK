name: ${COMPOSE_PROJECT_NAME:-keycloak-local}

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    env_file:
      - ../env/postgres.env
    secrets:
      - source: postgres_password
        target: postgres_password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../../configs/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  keycloak:
    build:
      context: ../../..
      dockerfile: images/keycloak/Dockerfile
      args:
        KEYCLOAK_IMAGE: ${KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:latest}
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../env/keycloak.env
    secrets:
      - source: keycloak_admin_password
        target: keycloak_admin_password
      - source: keycloak_db_password
        target: keycloak_db_password
    ports:
      - "${KEYCLOAK_HTTP_PORT:-8080}:8080"
      - "${KEYCLOAK_HEALTH_PORT:-9000}:9000"
    volumes:
      - ../../../images/keycloak/providers:/opt/keycloak/providers
      - ../../../images/keycloak/certs:/opt/keycloak/certs
    healthcheck:
      test: ["CMD-SHELL", "/opt/keycloak/scripts/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s
    restart: unless-stopped

  mailhog:
    image: ${MAILHOG_IMAGE:-mailhog/mailhog:v1.0.1}
    env_file:
      - ../env/mailhog.env
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    restart: unless-stopped

secrets:
  postgres_password:
    file: ../secrets/postgres_password.txt
  keycloak_admin_password:
    file: ../secrets/keycloak_admin_password.txt
  keycloak_db_password:
    file: ../secrets/keycloak_db_password.txt
  grafana_admin_password:
    file: ../secrets/grafana_admin_password.txt

volumes:
  postgres_data:
